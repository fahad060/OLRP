<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>قوانين OLRP</title>
    <style>
        body {
            background: #0d0d0d;
            color: #fff;
            font-family: sans-serif;
            padding: 20px;
        }
        .rule-section {
            margin-bottom: 10px;
            border: 1px solid #333;
            border-radius: 8px;
            overflow: hidden;
        }
        .rule-header {
            width: 100%;
            background: #1a1a1a;
            color: #ff9800;
            padding: 12px;
            font-size: 16px;
            border: none;
            cursor: pointer;
            text-align: right;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .rule-header.active {
            background: #262626;
        }
        .rule-content {
            display: none;
            padding: 10px;
            background: #111;
        }
        .rule-content.active {
            display: block;
        }
        .rule-item {
            padding: 10px 0;
            border-bottom: 1px solid #222;
        }
        .rule-item:last-child {
            border-bottom: none;
        }
        .rule-item-title {
            font-weight: bold;
            color: #ff9800;
        }
        .rule-penalty {
            display: inline-block;
            margin-top: 5px;
            padding: 4px 10px;
            background: #ff980033;
            border: 1px solid #ff9800;
            border-radius: 6px;
            font-size: 12px;
        }
        .chevron {
            transition: 0.3s;
        }
        .rule-header.active .chevron {
            transform: rotate(180deg);
        }
    </style>
</head>
<body>

<div id="rulesContainer"></div>

<script>
const rulesData = [

            { title: "استخدام التلي بورت", desc: "الانتقال الآني غير المشروع.", penalty: "باند نهائي" },
            { title: "إعطاء الحساب لشخص آخر", desc: "مشاركة بيانات الدخول.", penalty: "باند نهائي" },
            { title: "الاعتراض على القوانين", desc: "الاعتراض داخل اللعبة.", penalty: "تحذير" },
            { title: "استخدام الراديو وأنت ميت", desc: "التواصل اللاسلكي بعد الموت.", penalty: "باند 3 أيام" },
            { title: "تجاهل أوامر الإداري", desc: "عدم الامتثال أثناء التحقيق.", penalty: "باند 7 أيام" },
            { title: "الكذب على الإدارة", desc: "تقديم معلومات مضللة في التكت.", penalty: "باند 10 أيام" },
            { title: "ملصقات مسيئة", desc: "وضع ملصقات غير لائقة على السيارات.", penalty: "باند 3 أيام" },
            { title: "استخدام سكنات ضخمة/صغيرة", desc: "استخدام مظهر غير متناسق جداً.", penalty: "تحذير" },
            { title: "القفز المتكرر (Bunny Hopping)", desc: "القفز لتسريع الحركة.", penalty: "تحذير" },
            { title: "استخدام الشات للإساءة", desc: "الإساءة للسيرفر عبر الدردشة.", penalty: "باند نهائي" },
            { title: "تحريض اللاعبين", desc: "تحريضهم على ترك السيرفر.", penalty: "باند نهائي" }
        ]
    },
    {
        title: "القسم السابع: قوانين العقارات والاقتصاد (Property & Economy)",
        rules: [
            { title: "غسيل الأموال", desc: "يجب أن يتم عبر سيناريو واقعي وليس مجرد ميكانيكا لعبة.", penalty: "باند 5 أيام" },
            { title: "الاحتيال المالي الكبير", desc: "سرقة مبالغ ضخمة عبر وعود وهمية خارج نطاق RP.", penalty: "باند 10 أيام" },
            { title: "استخدام المنازل للاختباء", desc: "الاختباء من الشرطة للأبد داخل المنزل.", penalty: "باند 3 أيام" },
            { title: "التلاعب بأسعار السوق السوداء", desc: "التلاعب غير المشروع بالأسعار.", penalty: "باند 5 أيام" },
            { title: "شراء العقارات بأسماء وهمية", desc: "عدم استخدام الاسم الحقيقي للشخصية.", penalty: "تحذير" },
            { title: "استغلال نظام الرواتب (AFK Farming)", desc: "البقاء نشطاً دون لعب للحصول على الراتب.", penalty: "باند 3 أيام" },
            { title: "تحويل الأموال بين الشخصيات", desc: "نقل المال بين شخصيات نفس اللاعب.", penalty: "باند نهائي" },
            { title: "عدم دفع الضرائب (TAX)", desc: "عدم دفع الضرائب المفروض بها.", penalty: "باند 5 أيام" },
            { title: "التهديد بمصادرة الأملاك", desc: "التهديد بدون سبب قانوني.", penalty: "باند 5 أيام" }
        ]
    },
    {
        title: "القسم الثامن: قوانين تطوير الشخصية والتمثيل (Character & Roleplay)",
        rules: [
            { title: "تغيير الشخصية للهروب", desc: "تغيير الشخصية لتجنب العقاب.", penalty: "باند 10 أيام" },
            { title: "تمثيل الإصابة", desc: "يجب تمثيل الألم عند الحوادث أو إطلاق النار.", penalty: "باند يومين" },
            { title: "استخدام الأدوات (Props)", desc: "استخدامها بطريقة غير واقعية.", penalty: "باند يوم" },
            { title: "تجاهل الكاميرات", desc: "تجاهل وجود كاميرات مراقبة في الأماكن العامة.", penalty: "تحذير" },
            { title: "التمثيل بأنك سوبر هيرو", desc: "القيام بأفعال خارقة للعادة.", penalty: "باند 5 أيام" },
            { title: "عدم الالتزام بقصة الشخصية", desc: "مخالفة الـ Backstory الخاصة بك.", penalty: "تحذير" },
            { title: "استخدام معلومات الستريم", desc: "استخدام معلومات البث المباشر (Stream Sniping).", penalty: "باند نهائي" },
            { title: "التدخل في سيناريوهات الآخرين", desc: "التدخل بدون سبب.", penalty: "باند 3 أيام" },
            { title: "إجبار اللاعبين على مشاهد غير لائقة", desc: "الإكراه على تمثيل مشاهد غير أخلاقية.", penalty: "باند نهائي" },
            { title: "استخدام الكلبشات", desc: "استخدامها بدون سبب درامي.", penalty: "باند 3 أيام" },
            { title: "الهروب من السجن", desc: "الهروب بطريقة غير واقعية.", penalty: "باند 7 أيام" },
            { title: "تمثيل السكر المبالغ فيه", desc: "لغرض الإزعاج فقط.", penalty: "تحذير" },
            { title: "استخدام الأقنعة", desc: "استخدامها في كل الأوقات بدون سبب.", penalty: "تحذير" },
            { title: "تجاهل أوامر المفاوض", desc: "عدم الامتثال في السرقات.", penalty: "باند 3 أيام" },
            { title: "الاعتراف بالجرائم (FailRP)", desc: "الاعتراف بدون ضغط درامي.", penalty: "باند يومين" }
        ]
    }
];

function createRulesSections() {
    const container = document.getElementById('rulesContainer');

    rulesData.forEach((section, index) => {
        const sectionDiv = document.createElement('div');
        sectionDiv.className = 'rule-section';

        const header = document.createElement('button');
        header.className = 'rule-header';
        header.innerHTML = `
            <span>${section.title}</span>
            <span class="chevron">▼</span>
        `;

        const content = document.createElement('div');
        content.className = 'rule-content';

        section.rules.forEach(rule => {
            const item = document.createElement('div');
            item.className = 'rule-item';
            item.innerHTML = `
                <div class="rule-item-title">${rule.title}</div>
                <div>${rule.desc}</div>
                <span class="rule-penalty">${rule.penalty}</span>
            `;
            content.appendChild(item);
        });

        header.addEventListener('click', () => {
            header.classList.toggle('active');
            content.classList.toggle('active');
        });

        sectionDiv.appendChild(header);
        sectionDiv.appendChild(content);
        container.appendChild(sectionDiv);
    });
}

document.addEventListener('DOMContentLoaded', createRulesSections);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <title>OLRP - القوانين العامة</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
        :root {
            --bg: #0b0b0f;
            --card: #14141a;
            --card2: #1b1b22;
            --accent: #ff9800;
            --accent-soft: rgba(255, 152, 0, 0.15);
            --accent-border: rgba(255, 152, 0, 0.35);
            --text: #f5f5f5;
            --muted: #a0a0a8;
            --radius: 16px;
            --shadow: 0 12px 40px rgba(0,0,0,0.55);
            --transition: 0.25s ease;
        }

        body {
            margin: 0;
            padding: 20px;
            background: radial-gradient(circle at top, #1a1a22 0%, #0b0b0f 60%);
            font-family: "Segoe UI", sans-serif;
            color: var(--text);
            display: flex;
            justify-content: center;
        }

        .wrapper {
            width: 100%;
            max-width: 1100px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 22px;
            padding: 25px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .wrapper::before {
            content: "";
            position: absolute;
            inset: -40%;
            background:
                radial-gradient(circle at 0% 0%, rgba(255,152,0,0.12), transparent 60%),
                radial-gradient(circle at 100% 0%, rgba(255,255,255,0.05), transparent 60%);
            opacity: 0.7;
            pointer-events: none;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        h1 span {
            color: var(--accent);
        }

        .subtitle {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.7;
        }

        #rulesContainer {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .section {
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
            transition: var(--transition);
        }

        .section:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 35px rgba(0,0,0,0.6);
            border-color: var(--accent-border);
        }

        .header {
            padding: 14px 18px;
            background: var(--card2);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 15px;
        }

        .header .chevron {
            transition: var(--transition);
            color: var(--muted);
        }

        .header.active .chevron {
            transform: rotate(180deg);
            color: var(--accent);
        }

        .content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease;
            padding: 0 18px;
        }

        .content.active {
            padding-bottom: 12px;
        }

        .rule {
            padding: 12px 0;
            border-bottom: 1px dashed rgba(255,255,255,0.08);
            display: grid;
            grid-template-columns: 2fr 3fr auto;
            gap: 10px;
            font-size: 14px;
        }

        .rule:last-child {
            border-bottom: none;
        }

        .penalty {
            padding: 4px 10px;
            border-radius: 999px;
            background: var(--accent-soft);
            border: 1px solid var(--accent-border);
            color: var(--accent);
            font-size: 12px;
            white-space: nowrap;
        }

        @media (max-width: 700px) {
            .rule {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
<div class="wrapper">
    <h1>قوانين <span>سيرفر OLRP</span></h1>
    <p class="subtitle">هذه اللائحة تحتوي على جميع قوانين السيرفر من القسم الأول حتى القسم الثامن.</p>

    <div id="rulesContainer"></div>
</div>

];

/* ----------------------------- بناء الأقسام ----------------------------- */
function build() {
    const container = document.getElementById("rulesContainer");

    rulesData.forEach((sec, i) => {
        const section = document.createElement("div");
        section.className = "section";

        const header = document.createElement("div");
        header.className = "header";
        header.innerHTML = `${sec.title} <span class="chevron">▼</span>`;

        const content = document.createElement("div");
        content.className = "content";

        sec.rules.forEach(rule => {
            const div = document.createElement("div");
            div.className = "rule";
            div.innerHTML = `
                <div><strong>${rule.title}</strong></div>
                <div>${rule.desc}</div>
                <div class="penalty">${rule.penalty}</div>
            `;
            content.appendChild(div);
        });

        header.addEventListener("click", () => {
            const active = content.classList.contains("active");
            document.querySelectorAll(".content").forEach(c => {
                c.classList.remove("active");
                c.style.maxHeight = null;
            });
            document.querySelectorAll(".header").forEach(h => h.classList.remove("active"));

            if (!active) {
                header.classList.add("active");
                content.classList.add("active");
                content.style.maxHeight = content.scrollHeight + "px";
            }
        });

        section.appendChild(header);
        section.appendChild(content);
        container.appendChild(section);
    });
}

document.addEventListener("DOMContentLoaded", build);
</script>

</html>

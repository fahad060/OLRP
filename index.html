<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>قوانين OLRP</title>

    <style>
        body {
            background: #0d0d0d;
            color: #fff;
            font-family: "Segoe UI", sans-serif;
            padding: 20px;
            margin: 0;
        }

        #rulesContainer {
            max-width: 900px;
            margin: auto;
        }

        .rule-section {
            margin-bottom: 12px;
            border: 1px solid #222;
            border-radius: 10px;
            overflow: hidden;
            background: #111;
            transition: 0.25s;
        }

        .rule-section:hover {
            border-color: #ff9800;
            box-shadow: 0 0 15px #ff980033;
        }

        .rule-header {
            width: 100%;
            background: #1a1a1a;
            color: #ff9800;
            padding: 14px;
            font-size: 17px;
            border: none;
            cursor: pointer;
            text-align: right;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            transition: 0.25s;
        }

        .rule-header.active {
            background: #262626;
        }

        .chevron {
            transition: 0.25s;
        }

        .rule-header.active .chevron {
            transform: rotate(180deg);
        }

        .rule-content {
            display: none;
            padding: 12px 18px;
            background: #0f0f0f;
            animation: fadeIn 0.3s ease;
        }

        .rule-content.active {
            display: block;
        }

        .rule-item {
            padding: 12px 0;
            border-bottom: 1px solid #222;
        }

        .rule-item:last-child {
            border-bottom: none;
        }

        .rule-item-title {
            font-weight: bold;
            color: #ff9800;
            font-size: 15px;
        }

        .rule-item-desc {
            margin: 6px 0;
            color: #ccc;
            line-height: 1.6;
        }

        .rule-penalty {
            display: inline-block;
            padding: 4px 10px;
            background: #ff980033;
            border: 1px solid #ff9800;
            border-radius: 6px;
            font-size: 12px;
            color: #ff9800;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

function createRulesSections() {
    const container = document.getElementById('rulesContainer');

    rulesData.forEach(section => {
        const sectionDiv = document.createElement('div');
        sectionDiv.className = 'rule-section';

        const header = document.createElement('button');
        header.className = 'rule-header';
        header.innerHTML = `
            <span>${section.title}</span>
            <span class="chevron">▼</span>
        `;

        const content = document.createElement('div');
        content.className = 'rule-content';

        section.rules.forEach(rule => {
            const item = document.createElement('div');
            item.className = 'rule-item';
            item.innerHTML = `
                <div class="rule-item-title">${rule.title}</div>
                <div class="rule-item-desc">${rule.desc}</div>
                <span class="rule-penalty">${rule.penalty}</span>
            `;
            content.appendChild(item);
        });

        header.addEventListener('click', () => {
            header.classList.toggle('active');
            content.classList.toggle('active');
        });

        sectionDiv.appendChild(header);
        sectionDiv.appendChild(content);
        container.appendChild(sectionDiv);
    });
}

document.addEventListener('DOMContentLoaded', createRulesSections);
